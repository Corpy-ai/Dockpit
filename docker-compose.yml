version: '3.8'

services:
  dockpit:
    build: .
    image: corpy-ai/dockpit:3.3.0
    container_name: dockpit
    tty: true
    stdin_open: true
    volumes:
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Optional: Mount Docker binary if needed
      - /usr/bin/docker:/usr/bin/docker:ro
    environment:
      - TERM=xterm-256color
      - DOCKER_HOST=unix:///var/run/docker.sock
    networks:
      - dockpit-net
    restart: unless-stopped
    
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          memory: 50M
          cpus: '0.5'
        reservations:
          memory: 20M
          cpus: '0.1'

networks:
  dockpit-net:
    driver: bridge

# Alternative service for development
  dockpit-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
    image: corpy-ai/dockpit:dev
    container_name: dockpit-dev
    tty: true
    stdin_open: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/docker:/usr/bin/docker:ro
      # Mount source for development
      - ./src:/app/src:ro
      - ./Cargo.toml:/app/Cargo.toml:ro
    environment:
      - TERM=xterm-256color
      - RUST_LOG=debug
    networks:
      - dockpit-net